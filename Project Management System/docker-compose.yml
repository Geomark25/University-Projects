services:

  nginx-gateway:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-ui
      - user-service
      - team-service
      - task-service
    networks:
      - pms-network
    
  frontend-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    networks:
      - pms-network
    environment:
      - VITE_API_URL=http://${IP}

  user-db:
    image: postgres:17
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
    volumes:
      - ./databases/user_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - pms-network

  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    depends_on:
      user-db:
        condition: service_healthy
    volumes:
      - ./services/user:/app
    working_dir: /app
    environment:
      - DB_HOST=user-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=rootpassword
      - DB_NAME=user_db
    ports:
      - "8080:8000"
    networks:
      - pms-network

  team-db:
    image: postgres:17
    environment:
      POSTGRES_DB: team_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
    volumes:
      - ./databases/team_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d team_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    networks:
      - pms-network

  team-service:
    build:
      context: ./services/team
      dockerfile: Dockerfile
    depends_on:
      team-db:
        condition: service_healthy
    volumes:
      - ./services/team:/app
    working_dir: /app
    environment:
      - DB_HOST=team-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=rootpassword
      - DB_NAME=team_db
    ports:
      - "8081:8001"
    networks:
      - pms-network

  task-db:
    image: postgres:17
    environment:
      POSTGRES_DB: task_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootpassword
    volumes:
      - ./databases/task_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"
    networks:
      - pms-network

  task-service:
    build:
      context: ./services/task
      dockerfile: Dockerfile
    depends_on:
      task-db:
        condition: service_healthy
    volumes:
      - ./services/task:/app
    working_dir: /app
    environment:
      - DB_HOST=task-db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=rootpassword
      - DB_NAME=task_db
    ports:
      - "8082:8002"
    networks:
      - pms-network

networks:
  pms-network:
    driver: bridge