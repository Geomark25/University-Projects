<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AMT</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            display: flex;
            min-height: 100vh;
        }

        /* LEFT SIDE - Links */
        .content {
            flex: 1;
            padding: 40px;
            background: #ffffff;
        }

        section {
            margin-bottom: 30px;
        }

        h1 {
            margin-top: 0;
        }

        a {
            display: block;
            margin: 8px 0;
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* RIGHT SIDE - Image */
        .image-side {
            flex: 1;
            background-color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-side img {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 10px;
        }

        /* Responsive: stack vertically on small screens */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .image-side {
                order: -1;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="content">
        <h1>Automatic Manual Gearbox <br>Georgios Markantonakis 2026</h1>

        <section>
            <h2>Download Archive</h2>
            <a href="files/AMT.zip" download>
                Download Source code
            </a>
        </section>

        <section>
            <h2>Media Files</h2>

            <h3>Manual Demonstration</h3>
            <a href="media/audio.mp3" download>
                Download Video
            </a>

            <h3>Agent Demonstration</h3>
            <a href="media/video.mp4" download>
                Download Video
            </a>
        </section>

        <section>
            <h2>PDF Documents</h2>
            <a href="docs/report.pdf" target="_blank">
                Open report
            </a>
            <a href="docs/presentation.pdf" target="_blank">
                Open presentation
            </a>
        </section>
    </div>

    <!-- RIGHT SIDE -->
    <div class="image-side">
        <img src="images/engine.jpg" alt="Featured Image">
    </div>

</div>

</body>
</html>
